<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguAR — Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg);
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 1rem;
        }
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
        }
        .login-card h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 0.25rem;
            font-size: 1.75rem;
        }
        .login-card .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .role-toggle {
            display: flex;
            background: var(--bg);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 1.25rem;
        }
        .role-toggle button {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: var(--text-muted);
            transition: all 0.15s;
        }
        .role-toggle button.active {
            background: var(--primary);
            color: white;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.3rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.625rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.15s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .login-btn {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.15s;
        }
        .login-btn:hover {
            background: var(--primary-dark);
        }
        .login-error {
            color: var(--danger);
            font-size: 0.85rem;
            text-align: center;
            margin-top: 0.75rem;
            min-height: 1.2em;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>LinguAR</h1>
            <p class="subtitle">AR-Based Speech Learning</p>

            <div class="role-toggle">
                <button id="role-student" class="active" onclick="setRole('learner')">Student</button>
                <button id="role-teacher" onclick="setRole('teacher')">Teacher</button>
            </div>

            <form id="login-form" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="display_name">Full Name</label>
                    <input type="text" id="display_name" name="display_name" required
                           placeholder="Enter your full name" autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="classroom">Classroom</label>
                    <input type="text" id="classroom" name="classroom" required
                           placeholder="e.g. English B1 — Mrs. Sharma">
                </div>
                <input type="hidden" id="role" name="role" value="learner">
                <button type="submit" class="login-btn" id="login-btn">Start Learning</button>
            </form>
            <div class="login-error" id="login-error"></div>
        </div>
    </div>

    <script>
        var currentRole = "learner";

        function setRole(role) {
            currentRole = role;
            document.getElementById("role").value = role;
            document.getElementById("role-student").className = role === "learner" ? "active" : "";
            document.getElementById("role-teacher").className = role === "teacher" ? "active" : "";
            document.getElementById("login-btn").textContent = role === "teacher" ? "Open Dashboard" : "Start Learning";
        }

        async function handleLogin(e) {
            e.preventDefault();
            var form = document.getElementById("login-form");
            var errorEl = document.getElementById("login-error");
            errorEl.textContent = "";

            var formData = new FormData(form);

            try {
                var resp = await fetch("/api/auth/login", { method: "POST", body: formData });
                var data = await resp.json();

                if (data.error) {
                    errorEl.textContent = data.error;
                    return false;
                }

                // Mark this tab as authenticated
                sessionStorage.setItem("linguar_authed", "1");

                // Redirect based on role
                if (data.role === "teacher") {
                    window.location.href = "/teacher";
                } else {
                    window.location.href = "/";
                }
            } catch (err) {
                errorEl.textContent = "Connection error. Please try again.";
            }
            return false;
        }

        // Clear any stale localStorage on login page load
        localStorage.removeItem("linguar_user");
    </script>
</body>
</html>
